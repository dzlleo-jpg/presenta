<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!-- PDF.js CDN（解析 PDF 文件用） -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    // 设置 PDF.js worker
    if (window.pdfjsLib) {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presenta - AI 演示文稿生成</title>
  <link rel="stylesheet" href="styles/base.css?v=202604171200">
  <link rel="stylesheet" href="styles/landing.css">
  <script src="scripts/data/models.js?v=202604201000" defer></script>
  <script src="scripts/lib/api_providers_skill.js" defer></script>
  <script src="scripts/lib/ai_service_integrated.js?v=202604201210" defer></script>
  <script src="scripts/components/upload.js?v=202604201000" defer></script>
<style>
    /* AI Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px); z-index: 9998;
    }
    .ai-modal {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      background: #111827; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 28px; width: 500px; max-width: 90vw;
      z-index: 9999; box-shadow: 0 24px 64px rgba(0,0,0,0.5);
      font-family: 'DM Sans', system-ui, sans-serif;
    }
    .ai-modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .ai-modal-title {
      display: flex; align-items: center; gap: 8px;
      font-size: 17px; font-weight: 700; color: #F0F4FF;
    }
    .modal-close-btn { background: none; border: none; color: rgba(240,244,255,0.4); cursor: pointer; padding: 4px; }
    .modal-close-btn:hover { color: #F0F4FF; }
    .ai-section-label {
      font-size: 12px; font-weight: 600; color: rgba(240,244,255,0.45);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 10px; margin-top: 4px;
    }
    .ai-provider-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .ai-provider-option { cursor: pointer; }
    .ai-provider-option input { display: none; }
    .ai-provider-card {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-radius: 10px;
      border: 1.5px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03); transition: all 0.2s;
    }
    .ai-provider-option input:checked + .ai-provider-card {
      border-color: #3B82F6; background: rgba(59,130,246,0.12);
    }
    .ai-provider-card:hover { border-color: rgba(255,255,255,0.2); }
    .ai-provider-icon {
      width: 36px; height: 36px; border-radius: 8px;
      background: rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: center;
      color: rgba(240,244,255,0.6); flex-shrink: 0;
    }
    .ai-provider-option input:checked + .ai-provider-card .ai-provider-icon {
      background: rgba(59,130,246,0.2); color: #3B82F6;
    }
    .ai-provider-info { display: flex; flex-direction: column; gap: 2px; flex: 1; }
    .ai-provider-name { font-size: 14px; font-weight: 600; color: #F0F4FF; }
    .ai-provider-desc { font-size: 12px; color: rgba(240,244,255,0.45); }
    .ai-provider-check { font-size: 12px; color: #3B82F6; margin-left: auto; min-width: 40px; text-align: right; }
    .ai-provider-check.ok { color: #34D399; }
    .ai-provider-check.bad { color: #EF4444; }
    .ai-key-field { margin-bottom: 12px; }
    .ai-key-field input {
      width: 100%; padding: 10px 14px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05);
      color: #fff; font-size: 14px; box-sizing: border-box;
      font-family: inherit;
    }
    .ai-key-field input:focus { outline: none; border-color: #3B82F6; }
    .ai-key-field input::placeholder { color: rgba(240,244,255,0.3); }
    /* Validation status */
    .ai-validate-status {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-radius: 8px;
      margin-bottom: 16px; font-size: 13px;
    }
    .ai-validate-status.validating {
      background: rgba(59,130,246,0.1); color: #60A5FA;
      border: 1px solid rgba(59,130,246,0.2);
    }
    .ai-validate-status.success {
      background: rgba(52,211,153,0.1); color: #34D399;
      border: 1px solid rgba(52,211,153,0.2);
    }
    .ai-validate-status.error {
      background: rgba(239,68,68,0.1); color: #EF4444;
      border: 1px solid rgba(239,68,68,0.2);
    }
    .ai-validate-indicator { width: 8px; height: 8px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .ai-validate-text { flex: 1; }
    /* Actions */
    .ai-modal-actions { display: flex; gap: 8px; justify-content: space-between; align-items: center; }
    .ai-modal-right { display: flex; gap: 8px; }
    .btn-ghost-sm {
      background: none; border: 1px solid rgba(255,255,255,0.12);
      color: rgba(240,244,255,0.6); padding: 8px 16px;
      border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit;
    }
    .btn-ghost-sm:hover { background: rgba(255,255,255,0.05); color: #F0F4FF; }
    .btn-primary-sm {
      background: #3B82F6; border: none;
      color: #fff; padding: 8px 16px;
      border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit;
    }
    .btn-primary-sm:hover { background: #2563EB; }
    .btn-primary-sm:disabled { background: rgba(59,130,246,0.4); cursor: not-allowed; }
    .ai-modal-hint { font-size: 12px; color: #EF4444; margin-top: 10px; text-align: center; }
    .ai-model-label { font-size: 12px; margin-left: 4px; }
    .btn-icon {
      display: flex; align-items: center;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      padding: 6px 12px; border-radius: 8px; color: rgba(240,244,255,0.8);
      cursor: pointer; font-size: 13px; gap: 6px; transition: all 0.2s;
    }
    .btn-icon:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
    #aiModelLabel { font-size: 12px; max-width: 70px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    @keyframes spinAnim { to { transform: rotate(360deg); } }
    .spinning { animation: spinAnim 1s linear infinite; }
  </style>
</head>
<body class="bg-gradient-mesh">
  <!-- Background Effects -->
  <div class="bg-effects">
    <div class="gradient-orb gradient-orb-1"></div>
    <div class="gradient-orb gradient-orb-2"></div>
    <div class="grid-pattern"></div>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header-inner container">
      <div class="logo">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect x="2" y="2" width="24" height="24" rx="6" stroke="currentColor" stroke-width="2"/>
            <path d="M8 14L12 18L20 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="logo-text">Presenta</span>
      </div>
      
      <div class="header-actions">
        <button class="btn-icon" id="aiModelBtn" title="AI 模型设置">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="4" width="16" height="16" rx="3"/>
            <rect x="9" y="9" width="6" height="6" rx="1"/>
            <line x1="9" y1="2" x2="9" y2="4"/><line x1="15" y1="2" x2="15" y2="4"/>
            <line x1="9" y1="20" x2="9" y2="22"/><line x1="15" y1="20" x2="15" y2="22"/>
            <line x1="2" y1="9" x2="4" y2="9"/><line x1="2" y1="15" x2="4" y2="15"/>
            <line x1="20" y1="9" x2="22" y2="9"/><line x1="20" y1="15" x2="22" y2="15"/>
            <circle cx="19" cy="5" r="1.5" fill="currentColor" stroke="none"/>
          </svg>
          <span class="ai-model-label" id="aiModelLabel">MiniMax</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    <div class="hero">
      <!-- Main Headline -->
      <h1 class="headline animate-fade-in-up">
        从文档到演示，<span class="headline-accent">一步到位</span>
      </h1>

      <!-- Upload Area -->
      <div class="upload-container animate-fade-in-up stagger-1">
        <div class="upload-zone" id="uploadZone">
          <div class="upload-border"></div>
          
          <div class="upload-content">
            <div class="upload-icon">
              <svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="6" y="10" width="36" height="28" rx="4"/>
                <path d="M14 22L24 12L34 22"/>
                <path d="M24 12V32"/>
                <path d="M34 28V38H14V28"/>
              </svg>
              <div class="upload-icon-glow"></div>
            </div>
            
            <div class="upload-text">
              <span class="upload-primary">拖拽文件到此处</span>
              <span class="upload-secondary">或点击选择文件</span>
            </div>
            
            <div class="upload-formats">
              <span class="format-badge">PDF</span>
              <span class="format-badge">Markdown</span>
              <span class="format-badge">网址</span>
            </div>
          </div>

          <!-- Drag Over State -->
          <div class="upload-drag-over">
            <div class="drag-over-icon">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
            </div>
            <span class="drag-over-text">释放以导入文件</span>
          </div>

          <!-- Processing State -->
          <div class="upload-processing">
            <div class="processing-spinner"></div>
            <span class="processing-text">正在解析文件...</span>
            <div class="processing-progress">
              <div class="processing-progress-bar"></div>
            </div>
          </div>
        </div>

        <!-- File Input (Hidden) -->
        <input type="file" id="fileInput" accept=".pdf,.md,.markdown,.txt" hidden>
      </div>

      <!-- Alternative Actions -->
      <div class="alternative-actions animate-fade-in-up stagger-2">
        <button class="action-link" id="pasteMarkdownBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
          </svg>
          粘贴 Markdown
        </button>

        <button class="action-link" id="enterUrlBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
          输入网址
        </button>

        <button class="action-link" id="lastDraftBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
          继续上次草稿
        </button>
      </div>
    </div>

  <!-- Markdown Modal -->
  <div class="modal-overlay" id="markdownModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">粘贴 Markdown 内容</h3>
        <button class="modal-close" id="closeMarkdownModal">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <textarea class="markdown-input" id="markdownInput" placeholder="在这里粘贴你的 Markdown 内容..."></textarea>
        <div class="markdown-tips">
          <span class="tip-icon">💡</span>
          <span>支持标准 Markdown 语法：标题、列表、代码块、链接等</span>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelMarkdown">取消</button>
        <button class="btn btn-primary" id="submitMarkdown">开始生成</button>
      </div>
    </div>
  </div>

  <!-- URL Modal -->
  <div class="modal-overlay" id="urlModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">输入网址</h3>
        <button class="modal-close" id="closeUrlModal">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="url-input-group">
          <input type="url" class="url-input" id="urlInput" placeholder="https://example.com/article">
          <button class="btn btn-primary" id="fetchUrl">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            抓取
          </button>
        </div>
        <div class="url-tips">
          <span class="tip-icon">💡</span>
          <span>支持大多数公开网页，文章页面效果最佳</span>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelUrl">取消</button>
        <button class="btn btn-primary" id="submitUrl">开始生成</button>
      </div>
    </div>
  </div>

  <!-- Processing Modal -->
  <div class="modal-overlay" id="processingModal">
    <div class="modal modal-processing">
      <div class="processing-animation">
        <div class="processing-ring">
          <div class="processing-ring-inner"></div>
        </div>
        <div class="processing-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
        </div>
      </div>
      <h3 class="processing-title">正在解析文档</h3>
      <p class="processing-status" id="processingStatus">正在提取文本内容...</p>
      <div class="processing-progress-bar-container">
        <div class="processing-progress-bar-fill" id="processingBar"></div>
      </div>
      <p class="processing-hint">这通常需要几秒钟</p>
    </div>
  </div>

  <!-- AI Model Selection Modal -->
  <div class="modal-overlay" id="aiModalOverlay" style="display:none;"></div>
  <div class="ai-modal" id="aiModal" style="display:none;">
    <div class="ai-modal-header">
      <div class="ai-modal-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        AI 模型设置
      </div>
      <button class="modal-close-btn" id="closeAiModal">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Provider List -->
    <div class="ai-section-label">选择 AI 提供商</div>
    <div class="ai-provider-list">
      <label class="ai-provider-option" data-provider="minimax">
        <input type="radio" name="index-ai-provider" value="minimax">
        <span class="ai-provider-card">
          <span class="ai-provider-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/>
              <line x1="12" y1="22" x2="12" y2="15.5"/>
              <polyline points="22 8.5 12 15.5 2 8.5"/>
              <polyline points="2 15.5 12 8.5 22 15.5"/>
              <line x1="12" y1="2" x2="12" y2="8.5"/>
            </svg>
          </span>
          <span class="ai-provider-info">
            <span class="ai-provider-name">MiniMax</span>
            <span class="ai-provider-desc">国产大模型 · 中文长文本分析能力强</span>
          </span>
          <span class="ai-provider-check" id="check-minimax"></span>
        </span>
      </label>
      <label class="ai-provider-option" data-provider="openai">
        <input type="radio" name="index-ai-provider" value="openai">
        <span class="ai-provider-card">
          <span class="ai-provider-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <circle cx="12" cy="12" r="10"/>
              <path d="M8 12h8M12 8v8"/>
            </svg>
          </span>
          <span class="ai-provider-info">
            <span class="ai-provider-name">OpenAI GPT-4o</span>
            <span class="ai-provider-desc">最强推理 · 生成质量最高</span>
          </span>
          <span class="ai-provider-check" id="check-openai"></span>
        </span>
      </label>
      <label class="ai-provider-option" data-provider="deepseek">
        <input type="radio" name="index-ai-provider" value="deepseek">
        <span class="ai-provider-card">
          <span class="ai-provider-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <circle cx="12" cy="12" r="10"/>
              <path d="M8 12l3 3 5-6"/>
            </svg>
          </span>
          <span class="ai-provider-info">
            <span class="ai-provider-name">DeepSeek</span>
            <span class="ai-provider-desc">高性价比 · 支持浏览器直连</span>
          </span>
          <span class="ai-provider-check" id="check-deepseek"></span>
        </span>
      </label>
      <label class="ai-provider-option" data-provider="siliconflow">
        <input type="radio" name="index-ai-provider" value="siliconflow">
        <span class="ai-provider-card">
          <span class="ai-provider-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
            </svg>
          </span>
          <span class="ai-provider-info">
            <span class="ai-provider-name">SiliconFlow</span>
            <span class="ai-provider-desc">国产平价 API · DeepSeek 模型</span>
          </span>
          <span class="ai-provider-check" id="check-siliconflow"></span>
        </span>
      </label>
      <label class="ai-provider-option" data-provider="anthropic">
        <input type="radio" name="index-ai-provider" value="anthropic">
        <span class="ai-provider-card">
          <span class="ai-provider-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"/>
              <circle cx="12" cy="9" r="2.5"/>
            </svg>
          </span>
          <span class="ai-provider-info">
            <span class="ai-provider-name">Anthropic Claude</span>
            <span class="ai-provider-desc">支持浏览器直连 · 推荐使用</span>
          </span>
          <span class="ai-provider-check" id="check-anthropic"></span>
        </span>
      </label>

    </div>

    <!-- API Key Field -->
    <div class="ai-section-label">API Key <span id="apiKeyRequired" style="color:#EF4444;display:none">（必填）</span></div>
    <div class="ai-key-field">
      <input type="password" id="indexApiKeyInput" placeholder="输入 API Key" autocomplete="off">
    </div>

    <!-- Validation Status -->
    <div class="ai-validate-status" id="validateStatus" style="display:none;">
      <div class="ai-validate-indicator" id="validateIndicator"></div>
      <span class="ai-validate-text" id="validateText"></span>
    </div>

    <!-- Actions -->
    <div class="ai-modal-actions">
      <button class="btn-ghost-sm" id="btnTestApi">测试连接</button>
      <div class="ai-modal-right">
        <button class="btn-ghost-sm" id="cancelAiModal">取消</button>
        <button class="btn-primary-sm" id="saveAiModal">保存并继续</button>
      </div>
    </div>
    <p class="ai-modal-hint" id="aiModalHint" style="display:none;"></p>
  </div>

</body>
</html>
