<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>演示 - Presenta</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    .stage {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .slide-wrap {
      width: 1280px; height: 720px;
      position: relative; overflow: hidden;
      transform-origin: center center;
    }
    .slide-wrap iframe {
      width: 1280px; height: 720px; border: none;
    }

    .controls {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      padding: 12px 24px;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      opacity: 0; transition: opacity 0.3s;
      z-index: 10;
    }
    .controls.visible { opacity: 1; }
    .controls:hover { opacity: 1; }

    .ctrl-btn {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.8); border-radius: 8px;
      padding: 8px 12px; cursor: pointer; font-size: 13px;
      display: flex; align-items: center; gap: 6px;
      transition: all 0.2s;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
    .ctrl-btn:disabled { opacity: 0.3; cursor: default; }
    .ctrl-btn svg { width: 16px; height: 16px; }

    .slide-num {
      color: rgba(255,255,255,0.5); font-size: 13px;
      min-width: 60px; text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .progress {
      position: fixed; bottom: 0; left: 0; right: 0; height: 3px;
      background: rgba(255,255,255,0.1); z-index: 11;
    }
    .progress-fill {
      height: 100%; background: #667eea; transition: width 0.3s;
    }

    .start-overlay {
      position: fixed; inset: 0; z-index: 20;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.85);
      color: #fff; text-align: center;
    }
    .start-overlay.hidden { display: none; }
    .start-title { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
    .start-hint { font-size: 14px; color: rgba(255,255,255,0.4); margin-bottom: 24px; }
    .start-btn {
      padding: 12px 32px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
      transition: transform 0.2s;
    }
    .start-btn:hover { transform: translateY(-1px); }
    .start-keys { margin-top: 20px; font-size: 12px; color: rgba(255,255,255,0.3); }
    .start-keys kbd {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px; padding: 2px 6px; margin: 0 2px;
    }
  </style>
</head>
<body>
  <div class="stage" id="stage"></div>

  <div class="controls" id="controls">
    <button class="ctrl-btn" id="prevBtn" title="上一页">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="slide-num" id="slideNum">1 / 1</span>
    <button class="ctrl-btn" id="nextBtn" title="下一页">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <button class="ctrl-btn" id="fullscreenBtn" title="全屏">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
        <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
      </svg>
    </button>
    <button class="ctrl-btn" id="exitBtn" title="退出">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
      退出
    </button>
  </div>

  <div class="progress"><div class="progress-fill" id="progressFill"></div></div>

  <div class="start-overlay" id="startOverlay">
    <div>
      <div class="start-title">准备开始演示</div>
      <div class="start-hint">按空格键或点击开始</div>
      <button class="start-btn" id="startBtn">开始演示</button>
      <div class="start-keys">
        <kbd>←</kbd> <kbd>→</kbd> 翻页 &nbsp; <kbd>F</kbd> 全屏 &nbsp; <kbd>Esc</kbd> 退出
      </div>
    </div>
  </div>

  <script>
  (function() {
    let slides = [];
    let idx = 0;
    let presenting = false;

    function loadSlides() {
      const saved = sessionStorage.getItem('presenta-current-project') ||
                    localStorage.getItem('presenta-current-project');
      if (!saved) return;
      try {
        const project = JSON.parse(saved);
        slides = project?.slides || [];
      } catch (e) {}
    }

    function render() {
      const stage = document.getElementById('stage');
      stage.innerHTML = '';
      const slide = slides[idx];
      if (!slide) return;

      if (slide.html) {
        const wrap = document.createElement('div');
        wrap.className = 'slide-wrap';
        const iframe = document.createElement('iframe');
        iframe.sandbox = 'allow-same-origin allow-scripts';
        iframe.srcdoc = slide.html;
        wrap.appendChild(iframe);
        stage.appendChild(wrap);
        fitSlide(wrap);
        window.addEventListener('resize', () => fitSlide(wrap));
      }

      document.getElementById('slideNum').textContent = (idx + 1) + ' / ' + slides.length;
      document.getElementById('progressFill').style.width = ((idx + 1) / slides.length * 100) + '%';
      document.getElementById('prevBtn').disabled = idx === 0;
      document.getElementById('nextBtn').disabled = idx === slides.length - 1;
    }

    function fitSlide(wrap) {
      const sw = window.innerWidth, sh = window.innerHeight;
      const scale = Math.min(sw / 1280, sh / 720);
      wrap.style.transform = 'scale(' + scale + ')';
    }

    function next() { if (idx < slides.length - 1) { idx++; render(); } }
    function prev() { if (idx > 0) { idx--; render(); } }

    function start() {
      presenting = true;
      document.getElementById('startOverlay').classList.add('hidden');
      document.getElementById('controls').classList.add('visible');
      setTimeout(() => { if (presenting) document.getElementById('controls').classList.remove('visible'); }, 3000);
    }

    function exit() {
      presenting = false;
      if (document.fullscreenElement) document.exitFullscreen();
      window.location.href = 'editor.html';
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen();
      }
    }

    document.getElementById('startBtn').addEventListener('click', start);
    document.getElementById('startOverlay').addEventListener('click', (e) => { if (e.target.id === 'startOverlay') start(); });
    document.getElementById('prevBtn').addEventListener('click', prev);
    document.getElementById('nextBtn').addEventListener('click', next);
    document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);
    document.getElementById('exitBtn').addEventListener('click', exit);

    document.addEventListener('mousemove', (e) => {
      if (!presenting) return;
      const c = document.getElementById('controls');
      if (e.clientY > window.innerHeight - 100) c.classList.add('visible');
      else c.classList.remove('visible');
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); if (!presenting) start(); else next(); }
      else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); next(); }
      else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prev(); }
      else if (e.key === 'f' || e.key === 'F') { e.preventDefault(); toggleFullscreen(); }
      else if (e.key === 'Escape') { e.preventDefault(); exit(); }
    });

    loadSlides();
    if (slides.length) render();
    else document.getElementById('startOverlay').innerHTML = '<div><div class="start-title">没有幻灯片</div><div class="start-hint"><a href="editor.html" style="color:#667eea">返回编辑器</a></div></div>';
  })();
  </script>
</body>
</html>
