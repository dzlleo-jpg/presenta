<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编辑幻灯片 - Presenta</title>
  <link rel="stylesheet" href="../styles/base.css?v=202604221000">
  <link rel="stylesheet" href="../styles/editor.css">
  <script src="../scripts/data/models.js" defer></script>
</head>
<body class="bg-gradient-mesh">
  <!-- Background Effects -->
  <div class="bg-effects">
    <div class="gradient-orb gradient-orb-1"></div>
    <div class="gradient-orb gradient-orb-2"></div>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <a href="wizard.html" class="logo">
        <div class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 28 28" fill="none">
            <rect x="2" y="2" width="24" height="24" rx="6" stroke="currentColor" stroke-width="2"/>
            <path d="M8 14L12 18L20 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="logo-text">Presenta</span>
      </a>

      <div class="header-center">
        <div class="slide-nav">
          <button class="slide-nav-btn" id="prevSlideBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <span class="slide-counter">
            <span id="currentSlideNum">1</span> / <span id="totalSlideNum">1</span>
          </span>
          <button class="slide-nav-btn" id="nextSlideBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="header-actions">
        <div class="header-divider"></div>
        <button class="btn btn-secondary" id="previewBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          预览
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Left Panel: Slide Thumbnails (导航用，不可增删) -->
    <aside class="panel panel-left">
      <div class="panel-header">
        <h2 class="panel-title">幻灯片</h2>
      </div>
      <div class="slide-list" id="slideList">
        <!-- Thumbnails rendered by editor.js -->
      </div>
    </aside>

    <!-- Center Panel: Canvas -->
    <div class="panel panel-center">
      <div class="canvas-container">
        <div class="canvas" id="slideCanvas">
          <!-- Slide HTML injected here -->
        </div>
        <div class="canvas-controls">
          <button class="canvas-zoom-btn" id="zoomOutBtn" title="缩小">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
              <line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
          </button>
          <span class="zoom-level" id="zoomLevel">100%</span>
          <button class="canvas-zoom-btn" id="zoomInBtn" title="放大">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
              <line x1="11" y1="8" x2="11" y2="14"/>
              <line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
          </button>
          <button class="canvas-zoom-btn" id="fitBtn" title="适应窗口">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Right Panel: Global Style Controls -->
    <aside class="panel panel-right">
      <!-- Tab Navigation -->
      <div class="panel-tabs">
        <button class="panel-tab active" data-tab="style">🎨 风格</button>
        <button class="panel-tab" data-tab="content">📷 图片</button>
      </div>

      <!-- 风格 Tab: 全局 CSS 变量滑块 -->
      <div class="tab-content active" id="styleTab">
        <!-- 文字区块 -->
        <div class="style-section">
          <div class="section-header">
            <span class="section-icon">🔤</span>
            <span class="section-title">文字</span>
          </div>

          <div class="slider-group">
            <div class="slider-label-row">
              <span class="slider-label">字体大小</span>
              <span class="slider-value" id="fontSizeVal">24px</span>
            </div>
            <input type="range" class="style-slider" id="fontSizeSlider"
              min="16" max="40" value="24" step="1">
          </div>

          <div class="slider-group">
            <div class="slider-label-row">
              <span class="slider-label">行间距</span>
              <span class="slider-value" id="lineHeightVal">1.6</span>
            </div>
            <input type="range" class="style-slider" id="lineHeightSlider"
              min="1.2" max="2.0" value="1.6" step="0.1">
          </div>
        </div>

        <!-- 间距区块 -->
        <div class="style-section">
          <div class="section-header">
            <span class="section-icon">📐</span>
            <span class="section-title">间距</span>
          </div>

          <div class="slider-group">
            <div class="slider-label-row">
              <span class="slider-label">边距</span>
              <span class="slider-value" id="paddingXVal">64px</span>
            </div>
            <input type="range" class="style-slider" id="paddingXSlider"
              min="40" max="120" value="64" step="5">
          </div>

          <div class="slider-group">
            <div class="slider-label-row">
              <span class="slider-label">密度</span>
              <span class="slider-value" id="densityVal">标准</span>
            </div>
            <input type="range" class="style-slider" id="densitySlider"
              min="0.7" max="1.3" value="1.0" step="0.1">
          </div>
        </div>

        <!-- 字体组合 -->
        <div class="style-section">
          <div class="section-header">
            <span class="section-icon">🔤</span>
            <span class="section-title">字体组合</span>
          </div>
          <div class="font-presets" id="fontPresets">
            <button class="font-preset active" data-heading="Noto Serif SC" data-body="Noto Sans SC">
              <span class="preset-name">专业感</span>
              <span class="preset-desc">思源宋体 + 黑体</span>
            </button>
            <button class="font-preset" data-heading="Inter" data-body="Inter">
              <span class="preset-name">现代感</span>
              <span class="preset-desc">Inter</span>
            </button>
            <button class="font-preset" data-heading="楷体" data-body="Noto Sans SC">
              <span class="preset-name">温暖感</span>
              <span class="preset-desc">楷体 + 黑体</span>
            </button>
            <button class="font-preset" data-heading="sans-serif" data-body="sans-serif">
              <span class="preset-name">极简感</span>
              <span class="preset-desc">无衬线</span>
            </button>
          </div>
        </div>

        <!-- 实时预览提示 -->
        <div class="style-hint">
          💡 调整立即生效，刷新后自动保存
        </div>
      </div>

      <!-- 图片 Tab -->
      <div class="tab-content" id="contentTab">
        <div class="style-section">
          <div class="section-header">
            <span class="section-icon">📷</span>
            <span class="section-title">当前页图片</span>
          </div>
          <div class="page-image-list" id="pageImageList">
            <p class="empty-hint">本页暂无图片</p>
          </div>
        </div>

        <div class="style-section">
          <div class="section-header">
            <span class="section-icon">📋</span>
            <span class="section-title">全部图片一览</span>
          </div>
          <div class="all-image-grid" id="allImageGrid">
            <!-- 全部幻灯片的图片缩略图 -->
          </div>
        </div>

        <!-- 提示 -->
        <div class="style-hint">
          💡 点击画布上的图片也可操作
        </div>
      </div>
    </aside>
  </main>

  <!-- Image Popup (点击图片时弹出) -->
  <div class="image-popup" id="imagePopup" style="display:none;">
    <div class="popup-arrow"></div>
    <button class="popup-item" data-action="replace">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 1 0 .49-4.12"/>
      </svg>
      替换图片
    </button>
    <button class="popup-item" data-action="upload">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      上传本地
    </button>
    <button class="popup-item" data-action="regenerate">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      重新生成
    </button>
  </div>

  <script src="../scripts/components/editor.js" defer></script>
</body>
</html>
